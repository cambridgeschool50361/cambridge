<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Appointment Booking</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>
body{
    background:linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
    url('https://images.unsplash.com/photo-1521791136064-7986c2920216?q=80&w=1600&auto=format&fit=crop');
    background-size:cover;
    background-position:center;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:'Poppins',sans-serif;
}

.booking-card{
    background:white;
    width:100%;
    max-width:650px;
    border-radius:20px;
    padding:40px;
    box-shadow:0 10px 40px rgba(0,0,0,0.3);
}

.booking-card h2{
    text-align:center;
    font-weight:700;
    margin-bottom:10px;
    color:#0d6efd;
}

.booking-card p{
    text-align:center;
    color:#666;
    margin-bottom:30px;
}

.form-control,
.form-select{
    height:50px;
    border-radius:10px;
}

textarea.form-control{
    height:120px;
}

.btn-book{
    background:#0d6efd;
    color:white;
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    font-size:18px;
    font-weight:600;
    transition:0.3s;
}

.btn-book:hover{
    background:#084298;
}

.success-popup{
    position:fixed;
    top:20px;
    right:20px;
    background:#198754;
    color:white;
    padding:15px 25px;
    border-radius:10px;
    display:none;
    z-index:9999;
    font-weight:600;
}

.form-control,
.form-select{
    height:50px;
    border-radius:10px;
    border:1px solid #dcdcdc;
    box-shadow:none;
}

.form-control:focus,
.form-select:focus{
    border-color:#0d6efd;
    box-shadow:0 0 8px rgba(13,110,253,0.2);
}

textarea.form-control{
    height:auto;
}

label{
    font-weight:600;
    margin-bottom:6px;
}
</style>
</head>
<body>

<div class="success-popup" id="popup">
    Appointment Submitted Successfully!
</div>

<div class="booking-card">

    <h2><i class="fa-solid fa-calendar-check"></i> Career</h2>
    <p>Fill in your details.</p>

    <form id="appointmentForm">

        <form id="careerForm" enctype="multipart/form-data">

<div class="row">

    <div class="col-md-6 mb-3">
        <label class="form-label">Name *</label>
        <input type="text" name="name" class="form-control" required>
    </div>

    <div class="col-md-6 mb-3">
        <label class="form-label">Email *</label>
        <input type="email" name="email" class="form-control" required>
    </div>

</div>

<div class="row">

    <div class="col-md-6 mb-3">
        <label class="form-label">Mobile No. *</label>
        <input type="tel" name="mobile" class="form-control" required>
    </div>

    <div class="col-md-6 mb-3">
        <label class="form-label">Date Of Birth *</label>
        <input type="date" name="dob" class="form-control" required>
    </div>

</div>

<div class="row">

    <div class="col-md-6 mb-3">
        <label class="form-label">Gender *</label>
        <select name="gender" class="form-select" required>
            <option value="">-----Select-----</option>
            <option>Male</option>
            <option>Female</option>
            <option>Other</option>
        </select>
    </div>

    <div class="col-md-6 mb-3">
        <label class="form-label">Job Type *</label>
        <select name="jobtype" class="form-select" required>
            <option value="">-----Select-----</option>
            <option>Teacher</option>
            <option>Accountant</option>
            <option>Administrator</option>
            <option>Receptionist</option>
            <option>Office Staff</option>
        </select>
    </div>

</div>

<div class="mb-3">
    <label class="form-label">Address *</label>
    <textarea name="address" class="form-control" rows="3" required></textarea>
</div>

<div class="row">

    <div class="col-md-4 mb-3">
        <label class="form-label">State *</label>
        <input type="text" name="state" class="form-control" required>
    </div>

    <div class="col-md-4 mb-3">
        <label class="form-label">Town / City *</label>
        <input type="text" name="city" class="form-control" required>
    </div>

    <div class="col-md-4 mb-3">
        <label class="form-label">Zip/Postal Code *</label>
        <input type="text" name="zip" class="form-control" required>
    </div>

</div>

<div class="mb-3">
    <label class="form-label">Country *</label>
    <input type="text" name="country" class="form-control" placeholder="Please Enter Country" required>
</div>

<div class="mb-3">
    <label class="form-label">Educational Qualification *</label>
    <input type="text" name="qualification" class="form-control" required>
</div>

<div class="mb-3">
    <label class="form-label">CV Title *</label>
    <input type="text" name="cvtitle" class="form-control" placeholder="Example: Mathematics Teacher Resume" required>
</div>

<div class="mb-3">
    <label class="form-label">Upload Resume *</label>
    <input type="file" name="resume" class="form-control" accept=".pdf,.doc,.docx" required>
</div>

<button type="submit" class="btn-book">
    <i class="fa-solid fa-paper-plane"></i> Submit Application
</button>

</form>

    </form>
</div>

<script>
const scriptURL = "YOUR_GOOGLE_APPS_SCRIPT_WEBAPP_URL";

const form = document.getElementById('appointmentForm');

form.addEventListener('submit', e => {
    e.preventDefault();

    fetch(scriptURL, {
        method: 'POST',
        body: new FormData(form)
    })
    .then(response => {
        showPopup();
        form.reset();
    })
    .catch(error => console.error('Error!', error.message));
});

function showPopup(){
    const popup = document.getElementById('popup');
    popup.style.display = 'block';

    setTimeout(() => {
        popup.style.display = 'none';
    }, 3000);
}
</script>

</body>
</html>

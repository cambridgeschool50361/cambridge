<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>PDF Viewer</title>

<style>

body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#f4f4f4;
}

/* Header */

.header{
    background:#1e3a8a;
    color:white;
    padding:15px;
    text-align:center;
    font-size:28px;
    font-weight:bold;
}

/* PDF Container */

.pdf-container{
    width:90%;
    height:90vh;
    margin:20px auto;
    background:white;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

/* PDF Frame */

.pdf-container iframe{
    width:100%;
    height:100%;
    border:none;
}

</style>
</head>
<body>

<div class="header">
    PDF File Viewer
</div>

<div class="pdf-container">

    <!-- Replace sample.pdf with your PDF file name -->
    <iframe src="D:\Projects\website1\images\book-letter.pdf"></iframe>

</div>

</body>
</html>
